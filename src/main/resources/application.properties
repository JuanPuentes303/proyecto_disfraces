spring.application.name=disfraces-rivera

server.port=8080

# ===============================
# DATABASE - MYSQL
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/disfraces_rivera?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false

# ===============================
# FILE UPLOADS
# ===============================
app.upload.dir=${UPLOAD_DIR:uploads/disfraces}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# INTERNATIONALIZATION
# ===============================
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ===============================
# MAIL - GMAIL SMTP
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.admin.email=${ADMIN_EMAIL:}

# ===============================
# JWT
# ===============================
app.jwt.secret=${JWT_SECRET:disfracesriverasecretkeydisfracesriverasecretkey123456}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===============================
# OAUTH2 - GOOGLE LOGIN
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email