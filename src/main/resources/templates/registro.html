<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - Disfraces Rivera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="auth-page">
    <section class="auth-card">
        <h1>Crear cuenta</h1>
        <p class="auth-subtitle">Regístrate para poder reservar disfraces fácilmente.</p>

        <div class="alert alert-error" th:if="${errorRegistro}" th:text="${errorRegistro}"></div>

        <form th:action="@{/registro}" th:object="${registroRequest}" method="post" class="auth-form">

            <div class="form-group">
                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ej: Juan">
                <small class="field-error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
            </div>

            <div class="form-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" th:field="*{apellido}" placeholder="Ej: Puentes">
                <small class="field-error" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></small>
            </div>

            <div class="form-group">
                <label for="correo">Correo *</label>
                <input type="email" id="correo" th:field="*{correo}" placeholder="ejemplo@correo.com">
                <small class="field-error" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></small>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono *</label>
                <input type="text" id="telefono" th:field="*{telefono}" placeholder="Ej: 3162232565">
                <small class="field-error" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></small>
            </div>

            <div class="form-group">
                <label for="password">Contraseña *</label>
                <input type="password" id="password" th:field="*{password}" placeholder="Mínimo 6 caracteres">
                <small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </div>

            <div class="form-group">
                <label for="confirmarPassword">Confirmar contraseña *</label>
                <input type="password" id="confirmarPassword" th:field="*{confirmarPassword}" placeholder="Repite tu contraseña">
                <small class="field-error" th:if="${#fields.hasErrors('confirmarPassword')}" th:errors="*{confirmarPassword}"></small>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Registrarme</button>
        </form>

        <p class="auth-link">
            ¿Ya tienes cuenta?
            <a href="/login">Inicia sesión</a>
        </p>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
