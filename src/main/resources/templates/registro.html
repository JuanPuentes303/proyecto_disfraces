<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - Disfraces Rivera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="auth-page">
    <section class="auth-card">
        <h1 th:text="#{auth.register.title}">Crear cuenta</h1>
        <p class="auth-subtitle" th:text="#{auth.register.subtitle}">Regístrate para poder reservar disfraces fácilmente.</p>

        <div class="alert alert-error" th:if="${errorRegistro}" th:text="${errorRegistro}"></div>

        <form th:action="@{/registro}" th:object="${registroRequest}" method="post" class="auth-form">

            <div class="form-group">
                <label for="nombre" th:text="#{auth.register.name}">Nombre *</label>
                <input type="text" id="nombre" th:field="*{nombre}" th:placeholder="#{auth.register.placeholder.name}">
                <small class="field-error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
            </div>

            <div class="form-group">
                <label for="apellido" th:text="#{auth.register.lastname}">Apellido</label>
                <input type="text" id="apellido" th:field="*{apellido}" th:placeholder="#{auth.register.placeholder.lastname}">
                <small class="field-error" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></small>
            </div>

            <div class="form-group">
                <label for="correo" th:text="#{auth.register.email}">Correo *</label>
                <input type="email" id="correo" th:field="*{correo}" th:placeholder="#{auth.register.placeholder.email}">
                <small class="field-error" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></small>
            </div>

            <div class="form-group">
                <label for="telefono" th:text="#{auth.register.phone}">Teléfono *</label>
                <input type="text" id="telefono" th:field="*{telefono}" th:placeholder="#{auth.register.placeholder.phone}">
                <small class="field-error" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></small>
            </div>

            <div class="form-group">
                <label for="password" th:text="#{auth.register.password}">Contraseña *</label>
                <input type="password" id="password" th:field="*{password}" th:placeholder="#{auth.register.placeholder.password}">
                <small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </div>

            <div class="form-group">
                <label for="confirmarPassword" th:text="#{auth.register.confirmPassword}">Confirmar contraseña *</label>
                <input type="password" id="confirmarPassword" th:field="*{confirmarPassword}" th:placeholder="#{auth.register.placeholder.confirmPassword}">
                <small class="field-error" th:if="${#fields.hasErrors('confirmarPassword')}" th:errors="*{confirmarPassword}"></small>
            </div>

            <button type="submit" class="btn btn-primary btn-full" th:text="#{auth.register.button}">Registrarme</button>
        </form>

        <p class="auth-link">
            <span th:text="#{auth.register.haveAccount}">¿Ya tienes cuenta?</span>
            <a href="/login" th:text="#{auth.register.login}">Inicia sesión</a>
        </p>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
