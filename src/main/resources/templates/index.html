<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Disfraces Rivera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <section class="hero">
        <div class="hero__content">
            <span class="hero__tag" th:text="#{home.hero.tag}"></span>

            <h1 th:text="#{home.hero.title}"></h1>

            <p th:text="#{home.hero.description}"></p>

            <div class="hero__actions">
                <a href="/catalogo" class="btn btn-primary" th:text="#{home.hero.catalog}"></a>
                <a href="/registro" class="btn btn-secondary" th:text="#{home.hero.register}"></a>
            </div>
        </div>

        <div class="hero__card">
            <h2 th:text="#{home.features.title}"></h2>

            <ul>
                <li th:text="#{home.features.catalog}"></li>
                <li th:text="#{home.features.search}"></li>
                <li th:text="#{home.features.reserve}"></li>
                <li th:text="#{home.features.buy}"></li>
            </ul>
        </div>
    </section>

    <section class="features">
        <article class="feature-card">
            <h3 th:text="#{home.card.catalog.title}"></h3>
            <p th:text="#{home.card.catalog.text}"></p>
        </article>

        <article class="feature-card">
            <h3 th:text="#{home.card.reserve.title}"></h3>
            <p th:text="#{home.card.reserve.text}"></p>
        </article>

        <article class="feature-card">
            <h3 th:text="#{home.card.admin.title}"></h3>
            <p th:text="#{home.card.admin.text}"></p>
        </article>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
