<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Disfraces Rivera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="auth-page">
    <section class="auth-card">
        <h1>Iniciar sesión</h1>
        <p class="auth-subtitle">Ingresa para reservar y revisar tus disfraces.</p>

        <div class="alert alert-success" th:if="${param.registroExitoso}">
            Registro exitoso. Ahora puedes iniciar sesión.
        </div>

        <div class="alert alert-error" th:if="${param.error}">
            Correo o contraseña incorrectos.
        </div>

        <div class="alert alert-success" th:if="${param.logout}">
            Cerraste sesión correctamente.
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">

            <div class="form-group">
                <label for="username">Correo</label>
                <input type="email" id="username" name="username" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Entrar</button>
        </form>

        <p class="auth-link">
            ¿No tienes cuenta?
            <a href="/registro">Crear cuenta</a>
        </p>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
