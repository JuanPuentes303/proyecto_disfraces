<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Disfraces Rivera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="auth-page">
    <section class="auth-card">
        <h1 th:text="#{auth.login.title}"></h1>
        <p class="auth-subtitle" th:text="#{auth.login.subtitle}"></p>

        <div class="alert alert-success" th:if="${param.registroExitoso}">
            <span th:text="#{auth.login.successRegister}"></span>
        </div>

        <div class="alert alert-error" th:if="${param.error}">
            <span th:text="#{auth.login.error}"></span>
        </div>

        <div class="alert alert-success" th:if="${param.logout}">
            <span th:text="#{auth.login.logout}"></span>
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">

            <div class="form-group">
                <label for="username" th:text="#{auth.login.email}"></label>
                <input type="email" id="username" name="username" th:placeholder="#{auth.register.placeholder.email}" required>
            </div>

            <div class="form-group">
                <label for="password" th:text="#{auth.login.password}"></label>
                <input type="password" id="password" name="password" th:placeholder="#{auth.login.password}" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full" th:text="#{auth.login.button}"></button>
        </form>

        <div class="oauth-divider">
            <span>o</span>
        </div>

        <a th:href="@{/oauth2/authorization/google}" class="btn btn-google btn-full">
            Entrar con Google
        </a>

        <p class="auth-link">
            <span th:text="#{auth.login.noAccount}"></span>
            <a href="/registro" th:text="#{auth.login.create}"></a>
        </p>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
