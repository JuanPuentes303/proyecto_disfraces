<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis reservas - Disfraces Rivera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="admin-page">
    <section class="admin-header">
        <div>
            <h1 th:text="#{reservations.my.title}"></h1>
            <p th:text="#{reservations.my.subtitle}"></p>
        </div>

        <a href="/catalogo" class="btn btn-primary" th:text="#{reservations.catalog}"></a>
    </section>

    <div class="alert alert-success" th:if="${param.creada}">
        <span th:text="#{reservations.created}"></span>
    </div>

    <section class="admin-table-wrapper">
        <table class="admin-table">
            <thead>
            <tr>
                <th th:text="#{admin.table.image}"></th>
                <th th:text="#{admin.costumes}"></th>
                <th th:text="#{admin.table.type}"></th>
                <th th:text="#{detail.startDate}"></th>
                <th th:text="#{detail.endDate}"></th>
                <th th:text="#{admin.table.status}"></th>
                <th th:text="#{admin.table.observations}"></th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="reserva : ${reservas}">
                <td>
                    <img class="table-img"
                         th:if="${reserva.imagenDisfrazUrl != null}"
                         th:src="@{${reserva.imagenDisfrazUrl}}"
                         alt="Imagen del disfraz">

                    <span th:if="${reserva.imagenDisfrazUrl == null}" th:text="#{common.noImage}"></span>
                </td>

                <td th:text="${reserva.nombreDisfraz}"></td>
                <td th:text="${reserva.tipo}"></td>
                <td th:text="${reserva.fechaInicio}"></td>
                <td th:text="${reserva.fechaFin}"></td>
                <td>
                    <span class="status-pill" th:text="${reserva.estado}"></span>
                </td>
                <td th:text="${reserva.observaciones != null ? reserva.observaciones : 'Sin observaciones'}"></td>
            </tr>

            <tr th:if="${#lists.isEmpty(reservas)}">
                <td colspan="7" th:text="#{reservations.empty}"></td>
            </tr>
            </tbody>
        </table>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
