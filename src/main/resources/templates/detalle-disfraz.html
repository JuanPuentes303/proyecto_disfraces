<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${disfraz.nombre} + ' - Disfraces Rivera'">Detalle disfraz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="detail-page">

    <section class="detail-grid">
        <div class="detail-image-card">
            <img th:if="${disfraz.imagenPrincipalUrl != null}"
                 th:src="@{${disfraz.imagenPrincipalUrl}}"
                 th:alt="${disfraz.nombre}">

            <div class="image-placeholder detail-placeholder"
                 th:if="${disfraz.imagenPrincipalUrl == null}"></div>
        </div>

        <div class="detail-info-card">
            <span class="costume-category"
                  th:text="${disfraz.nombreCategoria}"></span>

            <h1 th:text="${disfraz.nombre}"></h1>

            <p class="detail-description"
               th:text="${disfraz.descripcion != null && !disfraz.descripcion.isEmpty() ? disfraz.descripcion : #messages.msg('catalog.noDescription')}"></p>

            <div class="detail-meta">
                <div>
                    <strong th:text="#{detail.size}"></strong>
                    <span th:text="${disfraz.talla}"></span>
                </div>

                <div>
                    <strong th:text="#{detail.gender}"></strong>
                    <span th:text="${disfraz.genero}"></span>
                </div>

                <div>
                    <strong th:text="#{detail.rental}"></strong>
                    <span th:text="'$' + ${disfraz.precioAlquiler}"></span>
                </div>

                <div th:if="${disfraz.precioCompra != null}">
                    <strong th:text="#{detail.purchase}"></strong>
                    <span th:text="'$' + ${disfraz.precioCompra}"></span>
                </div>
            </div>

            <a href="/catalogo" class="btn btn-secondary" th:text="#{detail.backCatalog}"></a>
        </div>
    </section>

    <section class="reservation-section">
        <div class="section-title">
            <h2 th:text="#{detail.reserveTitle}"></h2>
            <p th:text="#{detail.reserveSubtitle}"></p>
        </div>

        <div class="availability-card">
    <h3 th:text="#{detail.checkAvailability}"></h3>
    <p th:text="#{detail.checkAvailabilityText}"></p>

    <form th:action="@{/disfraces/{id}/disponibilidad(id=${disfraz.id})}"
          method="get"
          class="availability-form">

        <div class="form-group">
            <label for="fechaInicioConsulta" th:text="#{detail.startDate}"></label>
            <input type="date"
                   id="fechaInicioConsulta"
                   name="fechaInicio"
                   th:value="${fechaInicioConsulta}">
        </div>

        <div class="form-group">
            <label for="fechaFinConsulta" th:text="#{detail.endDate}"></label>
            <input type="date"
                   id="fechaFinConsulta"
                   name="fechaFin"
                   th:value="${fechaFinConsulta}">
        </div>

        <button type="submit" class="btn btn-secondary" th:text="#{detail.verify}"></button>
    </form>

    <div class="alert alert-success"
         th:if="${mensajeDisponibilidad != null and disponibleConsulta == true}"
         th:text="${mensajeDisponibilidad}">
    </div>

    <div class="alert alert-error"
            th:if="${mensajeDisponibilidad != null and disponibleConsulta == false}"
            th:text="${mensajeDisponibilidad}">
        </div>

        <div class="alert alert-error"
            th:if="${errorDisponibilidad}"
            th:text="${errorDisponibilidad}">
        </div>
    </div>

        <div class="alert alert-error" th:if="${errorReserva}" th:text="${errorReserva}"></div>

        <div sec:authorize="!isAuthenticated()" class="auth-card reservation-login-card">
            <h3 th:text="#{detail.loginRequired}"></h3>
            <p class="auth-subtitle" th:text="#{detail.loginRequiredText}"></p>

            <div class="hero__actions">
                <a href="/login" class="btn btn-primary" th:text="#{nav.login}"></a>
                <a href="/registro" class="btn btn-secondary" th:text="#{nav.register}"></a>
            </div>
        </div>

        <form sec:authorize="isAuthenticated()"
              th:action="@{/disfraces/{id}/reservar(id=${disfraz.id})}"
              th:object="${reservaRequest}"
              method="post"
              class="auth-card reservation-form">

            <div class="form-row">
                <div class="form-group">
                    <label for="tipo" th:text="#{detail.type}"></label>
                    <select id="tipo" th:field="*{tipo}">
                        <option value="" th:text="#{admin.form.select}"></option>
                        <option th:each="tipoReserva : ${tiposReserva}"
                                th:value="${tipoReserva}"
                                th:text="${tipoReserva}">
                        </option>
                    </select>
                    <small class="field-error" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></small>
                </div>

                <div class="form-group">
                    <label for="fechaInicio" th:text="#{detail.startDate}"></label>
                    <input type="date" id="fechaInicio" th:field="*{fechaInicio}">
                    <small class="field-error" th:if="${#fields.hasErrors('fechaInicio')}" th:errors="*{fechaInicio}"></small>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="fechaFin" th:text="#{detail.endDate}"></label>
                    <input type="date" id="fechaFin" th:field="*{fechaFin}">
                    <small class="field-error" th:if="${#fields.hasErrors('fechaFin')}" th:errors="*{fechaFin}"></small>
                </div>

                <div class="form-group">
                    <label for="observaciones" th:text="#{detail.observations}"></label>
                    <input type="text" id="observaciones" th:field="*{observaciones}"
                           th:placeholder="#{detail.observations}">
                    <small class="field-error" th:if="${#fields.hasErrors('observaciones')}" th:errors="*{observaciones}"></small>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" th:text="#{detail.confirmReservation}"></button>
        </form>
    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
