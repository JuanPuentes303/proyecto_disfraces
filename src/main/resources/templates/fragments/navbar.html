<nav class="navbar" th:fragment="navbar" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="navbar__brand">
        <a href="/" th:text="#{app.name}"></a>
    </div>

    <button class="navbar__toggle"
            id="navbarToggle"
            type="button"
            aria-label="Abrir menú de navegación"
            aria-controls="navbarLinks"
            aria-expanded="false">
        ☰
    </button>

    <div class="navbar__links" id="navbarLinks">
        <a href="/" th:text="#{nav.home}"></a>
        <a href="/catalogo" th:text="#{nav.catalog}"></a>

        <a href="/admin" sec:authorize="hasRole('ADMIN')" th:text="#{nav.admin}"></a>
        <a href="/usuario/reservas" sec:authorize="hasAnyRole('USER','ADMIN')" th:text="#{nav.myReservations}"></a>

        <a href="/login" sec:authorize="!isAuthenticated()" th:text="#{nav.login}"></a>
        <a href="/registro" class="btn-nav" sec:authorize="!isAuthenticated()" th:text="#{nav.register}"></a>

        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" class="logout-form">
            <button type="submit" class="logout-button" th:text="#{nav.logout}"></button>
        </form>

        <div class="language-switcher">
            <a href="?lang=es">ES</a>
            <span>|</span>
            <a href="?lang=en">EN</a>
            <span>|</span>
            <a href="?lang=ja">JA</a>
        </div>
    </div>
</nav>
