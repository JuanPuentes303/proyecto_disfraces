<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Disfraces Admin - Disfraces Rivera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="admin-page">
    <section class="admin-header">
        <div>
            <h1>Disfraces registrados</h1>
            <p>Lista de disfraces subidos por el administrador.</p>
        </div>

        <a href="/admin/disfraces/nuevo" class="btn btn-primary">Nuevo disfraz</a>
    </section>

    <div class="alert alert-success" th:if="${param.creado}">
        Disfraz creado correctamente.
    </div>

    <section class="admin-table-wrapper">
        <table class="admin-table">
            <thead>
            <tr>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Talla</th>
                <th>Género</th>
                <th>Alquiler</th>
                <th>Compra</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="disfraz : ${disfraces}">
                <td>
                    <img class="table-img"
                         th:if="${!disfraz.imagenes.isEmpty()}"
                         th:src="@{${disfraz.imagenes[0].urlImagen}}"
                         alt="Imagen disfraz">

                    <span th:if="${disfraz.imagenes.isEmpty()}">Sin imagen</span>
                </td>

                <td th:text="${disfraz.nombre}"></td>
                <td th:text="${disfraz.categoria != null ? disfraz.categoria.nombre : 'Sin categoría'}"></td>
                <td th:text="${disfraz.talla}"></td>
                <td th:text="${disfraz.genero}"></td>
                <td th:text="${'$' + disfraz.precioAlquiler}"></td>
                <td th:text="${disfraz.precioCompra != null ? '$' + disfraz.precioCompra : 'No disponible'}"></td>
            </tr>

            <tr th:if="${#lists.isEmpty(disfraces)}">
                <td colspan="7">Todavía no hay disfraces registrados.</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
