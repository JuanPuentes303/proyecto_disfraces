<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar disfraz - Disfraces Rivera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="auth-page">
    <section class="auth-card form-wide">
        <h1>Editar disfraz</h1>
        <p class="auth-subtitle">
            Actualiza los datos del disfraz. Si no seleccionas una nueva imagen, se conservará la actual.
        </p>

        <div class="alert alert-error" th:if="${errorDisfraz}" th:text="${errorDisfraz}"></div>

        <form th:action="@{/admin/disfraces/{id}/editar(id=${disfrazId})}"
              th:object="${disfrazRequest}"
              method="post"
              enctype="multipart/form-data"
              class="auth-form">

            <div class="form-group">
                <label for="nombre">Nombre del disfraz *</label>
                <input type="text" id="nombre" th:field="*{nombre}">
                <small class="field-error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" th:field="*{descripcion}" rows="4"></textarea>
                <small class="field-error" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></small>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="talla">Talla *</label>
                    <select id="talla" th:field="*{talla}">
                        <option value="">Seleccione</option>
                        <option value="XS">XS</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                        <option value="Infantil">Infantil</option>
                        <option value="Única">Única</option>
                    </select>
                    <small class="field-error" th:if="${#fields.hasErrors('talla')}" th:errors="*{talla}"></small>
                </div>

                <div class="form-group">
                    <label for="genero">Género *</label>
                    <select id="genero" th:field="*{genero}">
                        <option value="">Seleccione</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Unisex">Unisex</option>
                        <option value="Infantil">Infantil</option>
                    </select>
                    <small class="field-error" th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}"></small>
                </div>
            </div>

            <div class="form-group">
                <label for="categoriaId">Categoría *</label>
                <select id="categoriaId" th:field="*{categoriaId}">
                    <option value="">Seleccione una categoría</option>
                    <option th:each="categoria : ${categorias}"
                            th:value="${categoria.id}"
                            th:text="${categoria.nombre}">
                    </option>
                </select>
                <small class="field-error" th:if="${#fields.hasErrors('categoriaId')}" th:errors="*{categoriaId}"></small>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="precioAlquiler">Precio alquiler *</label>
                    <input type="number" id="precioAlquiler" th:field="*{precioAlquiler}" min="0" step="1000">
                    <small class="field-error" th:if="${#fields.hasErrors('precioAlquiler')}" th:errors="*{precioAlquiler}"></small>
                </div>

                <div class="form-group">
                    <label for="precioCompra">Precio compra</label>
                    <input type="number" id="precioCompra" th:field="*{precioCompra}" min="0" step="1000">
                    <small class="field-error" th:if="${#fields.hasErrors('precioCompra')}" th:errors="*{precioCompra}"></small>
                </div>
            </div>

            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" th:field="*{disponibleVenta}">
                    Disponible para venta
                </label>
            </div>

            <div class="form-group">
                <label for="imagen">Nueva imagen principal opcional</label>
                <input type="file" id="imagen" name="imagen" accept="image/*">
            </div>

            <button type="submit" class="btn btn-primary btn-full">Guardar cambios</button>

            <a href="/admin/disfraces" class="btn btn-secondary btn-full text-center">Volver</a>
        </form>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
