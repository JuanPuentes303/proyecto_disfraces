<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Disfraces Rivera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="admin-page">
    <section class="admin-header">
        <div>
            <h1 th:text="#{admin.title}"></h1>
            <p th:text="#{admin.subtitle}"></p>
        </div>
    </section>

    <section class="admin-grid">
        <a href="/admin/disfraces" class="admin-card">
            <h2 th:text="#{admin.costumes}"></h2>
            <p th:text="#{admin.costumesText}"></p>
        </a>

        <a href="/admin/disfraces/nuevo" class="admin-card">
            <h2 th:text="#{admin.newCostume}"></h2>
            <p th:text="#{admin.newCostumeText}"></p>
        </a>

        <a href="/admin/reservas" class="admin-card">
            <h2 th:text="#{admin.reservations}"></h2>
            <p th:text="#{admin.reservationsText}"></p>
        </a>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
