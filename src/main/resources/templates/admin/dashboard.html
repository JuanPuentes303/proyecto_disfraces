<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Disfraces Rivera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="admin-page">
    <section class="admin-header">
        <div>
            <h1 th:text="#{admin.title}">Panel administrador</h1>
            <p th:text="#{admin.subtitle}">Gestiona disfraces, fotos, precios y reservas.</p>
        </div>
    </section>

    <section class="admin-grid">
        <a href="/admin/disfraces" class="admin-card">
            <h2 th:text="#{admin.costumes}">Disfraces</h2>
            <p th:text="#{admin.costumesText}">Crear, listar y administrar disfraces.</p>
        </a>

        <a href="/admin/disfraces/nuevo" class="admin-card">
            <h2 th:text="#{admin.newCostume}">Subir nuevo disfraz</h2>
            <p th:text="#{admin.newCostumeText}">Agrega fotos, tallas, categorías y precios.</p>
        </a>

        <a href="/admin/reservas" class="admin-card">
            <h2 th:text="#{admin.reservations}">Reservas</h2>
            <p th:text="#{admin.reservationsText}">Revisa las reservas realizadas por los clientes.</p>
        </a>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
