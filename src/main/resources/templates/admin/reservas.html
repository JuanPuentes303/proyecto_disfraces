<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservas Admin - Disfraces Rivera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="admin-page">
    <section class="admin-header">
        <div>
            <h1 th:text="#{admin.reservations.title}"></h1>
            <p th:text="#{admin.reservations.subtitle}"></p>
        </div>

        <a href="/admin" class="btn btn-secondary" th:text="#{admin.backPanel}"></a>
    </section>

    <div class="alert alert-success" th:if="${param.cancelada}">
        <span th:text="#{admin.reservations.cancelled}"></span>
    </div>

    <div class="alert alert-success" th:if="${param.finalizada}">
        <span th:text="#{admin.reservations.finished}"></span>
    </div>

    <section class="admin-table-wrapper">
        <table class="admin-table">
            <thead>
            <tr>
                <th th:text="#{admin.table.image}"></th>
                <th th:text="#{admin.costumes}"></th>
                <th th:text="#{admin.table.customer}"></th>
                <th th:text="#{admin.table.contact}"></th>
                <th th:text="#{admin.table.type}"></th>
                <th th:text="#{admin.table.dates}"></th>
                <th th:text="#{admin.table.status}"></th>
                <th th:text="#{admin.table.observations}"></th>
                <th th:text="#{admin.table.actions}"></th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="reserva : ${reservas}">
                <td>
                    <img class="table-img"
                         th:if="${reserva.imagenDisfrazUrl != null}"
                         th:src="@{${reserva.imagenDisfrazUrl}}"
                         alt="Imagen del disfraz">

                    <span th:if="${reserva.imagenDisfrazUrl == null}" th:text="#{common.noImage}"></span>
                </td>

                <td th:text="${reserva.nombreDisfraz}"></td>

                <td>
                    <strong th:text="${reserva.nombreCliente}"></strong>
                    <br>
                    <small th:text="${reserva.correoCliente}"></small>
                </td>

                <td th:text="${reserva.telefonoCliente}"></td>

                <td th:text="${reserva.tipo}"></td>

                <td>
                    <span th:text="${reserva.fechaInicio}"></span>
                    <br>
                    <span th:text="${reserva.fechaFin}"></span>
                </td>

                <td>
                    <span class="status-pill" th:text="${reserva.estado}"></span>
                </td>

                <td th:text="${reserva.observaciones != null ? reserva.observaciones : 'Sin observaciones'}"></td>

                <td>
                    <div class="table-actions">
                        <form th:if="${reserva.estado.name() == 'ACTIVA'}"
                              th:action="@{/admin/reservas/{id}/cancelar(id=${reserva.id})}"
                              method="post">
                            <button type="submit" class="btn-small btn-danger" th:text="#{admin.actions.cancel}"></button>
                        </form>

                        <form th:if="${reserva.estado.name() == 'ACTIVA'}"
                              th:action="@{/admin/reservas/{id}/finalizar(id=${reserva.id})}"
                              method="post">
                            <button type="submit" class="btn-small btn-success" th:text="#{admin.actions.finish}"></button>
                        </form>

                        <span th:if="${reserva.estado.name() != 'ACTIVA'}" th:text="#{admin.actions.noActions}"></span>
                    </div>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(reservas)}">
                <td colspan="9" th:text="#{admin.reservations.empty}"></td>
            </tr>
            </tbody>
        </table>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
