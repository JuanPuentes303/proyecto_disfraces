<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo disfraz - Disfraces Rivera</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="auth-page">
    <section class="auth-card form-wide">
        <h1 th:text="#{admin.form.createTitle}">Subir nuevo disfraz</h1>
        <p class="auth-subtitle" th:text="#{admin.form.createSubtitle}">
            Completa los datos del disfraz y selecciona una imagen principal.
        </p>

        <div class="alert alert-error" th:if="${errorDisfraz}" th:text="${errorDisfraz}"></div>

        <form th:action="@{/admin/disfraces/nuevo}"
              th:object="${disfrazRequest}"
              method="post"
              enctype="multipart/form-data"
              class="auth-form">

            <div class="form-group">
                <label for="nombre" th:text="#{admin.form.name}">Nombre del disfraz *</label>
                <input type="text" id="nombre" th:field="*{nombre}" th:placeholder="#{admin.form.name}">
                <small class="field-error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
            </div>

            <div class="form-group">
                <label for="descripcion" th:text="#{admin.form.description}">Descripción</label>
                <textarea id="descripcion" th:field="*{descripcion}" rows="4"
                          th:placeholder="#{admin.form.description}"></textarea>
                <small class="field-error" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></small>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="talla" th:text="#{admin.form.size}">Talla *</label>
                    <select id="talla" th:field="*{talla}">
                        <option value="" th:text="#{admin.form.select}">Seleccione</option>
                        <option value="XS">XS</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                        <option value="Infantil">Infantil</option>
                        <option value="Única">Única</option>
                    </select>
                    <small class="field-error" th:if="${#fields.hasErrors('talla')}" th:errors="*{talla}"></small>
                </div>

                <div class="form-group">
                    <label for="genero" th:text="#{admin.form.gender}">Género *</label>
                    <select id="genero" th:field="*{genero}">
                        <option value="" th:text="#{admin.form.select}">Seleccione</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Unisex">Unisex</option>
                        <option value="Infantil">Infantil</option>
                    </select>
                    <small class="field-error" th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}"></small>
                </div>
            </div>

            <div class="form-group">
                <label for="categoriaId" th:text="#{admin.form.category}">Categoría *</label>
                <select id="categoriaId" th:field="*{categoriaId}">
                    <option value="" th:text="#{admin.form.selectCategory}">Seleccione una categoría</option>
                    <option th:each="categoria : ${categorias}"
                            th:value="${categoria.id}"
                            th:text="${categoria.nombre}">
                    </option>
                </select>
                <small class="field-error" th:if="${#fields.hasErrors('categoriaId')}" th:errors="*{categoriaId}"></small>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="precioAlquiler" th:text="#{admin.form.rentalPrice}">Precio alquiler *</label>
                    <input type="number" id="precioAlquiler" th:field="*{precioAlquiler}" min="0" step="1000"
                           placeholder="30000">
                    <small class="field-error" th:if="${#fields.hasErrors('precioAlquiler')}" th:errors="*{precioAlquiler}"></small>
                </div>

                <div class="form-group">
                    <label for="precioCompra" th:text="#{admin.form.purchasePrice}">Precio compra</label>
                    <input type="number" id="precioCompra" th:field="*{precioCompra}" min="0" step="1000"
                           placeholder="90000">
                    <small class="field-error" th:if="${#fields.hasErrors('precioCompra')}" th:errors="*{precioCompra}"></small>
                </div>
            </div>

            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" th:field="*{disponibleVenta}">
                    <span th:text="#{admin.form.availableForSale}">Disponible para venta</span>
                </label>
            </div>

            <div class="form-group">
                <label for="imagen" th:text="#{admin.form.mainImage}">Imagen principal *</label>
                <input type="file" id="imagen" name="imagen" accept="image/*">
            </div>

            <button type="submit" class="btn btn-primary btn-full" th:text="#{admin.form.save}">Guardar disfraz</button>

            <a href="/admin/disfraces" class="btn btn-secondary btn-full text-center" th:text="#{admin.form.back}">Volver</a>
        </form>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
